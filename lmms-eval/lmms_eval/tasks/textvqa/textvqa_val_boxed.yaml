task: textvqa_val_boxed
test_split: validation
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: submission
    aggregation: !function utils.textvqa_aggregate_submissions
    higher_is_better: true
process_results: !function utils_boxed.textvqa_process_results
include: _default_template_textvqa_yaml
generation_kwargs:
  max_new_tokens: 8192
  until: []
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase. Put your final answer in \\boxed{}."
    ocr: false
