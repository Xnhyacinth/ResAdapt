dataset_name: "Subset"
task: "egoschema_subset_boxed"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.egoschema_doc_to_visual
doc_to_text: !function utils_boxed.egoschema_doc_to_text
doc_to_target: !function utils.egoschema_doc_to_answer
process_results: !function utils_boxed.egoschema_process_results_generation
generation_kwargs:
  max_new_tokens: 8192
  until: []
metric_list:
  - metric: submission
    aggregation: !function utils.egoschema_aggregate_mc
    higher_is_better: true
  - metric: score
    aggregation: !function utils.egoschema_aggregate_score
    higher_is_better: true
include: _default_template_yaml
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly. Put your final answer in \\boxed{}."
  aria:
    pre_prompt: "Please answer the question about the video:\n"
    post_prompt: "\nAnswer with the option's letter from the given choices directly. Put your final answer in \\boxed{}."
