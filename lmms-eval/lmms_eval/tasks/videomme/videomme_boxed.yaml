dataset_path: lmms-lab/Video-MME
dataset_kwargs:
  token: True
  cache_dir: videomme
  video: True
  # From_YouTube: True
task: videomme_boxed
test_split: test
output_type: generate_until
cluster_key: videoID  # For clustered SE calculation - questions from same video are correlated
doc_to_visual: !function utils.videomme_doc_to_visual
doc_to_text: !function utils.videomme_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 8192
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
  until: []
# The return value of process_results will be used by metrics
process_results: !function utils_boxed.videomme_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: videomme_perception_score
    aggregation: !function utils.videomme_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly. Put your final answer in \\boxed{}."
  gpt4v:
    pre_prompt: ""
    post_prompt: "Answer the question with A, B, C, or D. Put your final answer in \\boxed{}."
  llava_vid:
    pre_prompt: ""
    post_prompt: "The best answer is: Put your final answer in \\boxed{}."
  qwen3_vl:
    format: "qwen3_vl"
    pre_prompt: "Question: "
    post_prompt: "Answer with the option letter only. Put your final answer in \\boxed{}."
  # qwen_vl:  
  #   pre_prompt: ""
  #   post_prompt: " Answer:"
  # otterhd:
  #   pre_prompt: ""
  #   post_prompt: " Answer:"
  xcomposer2_4khd:
    pre_prompt: "[UNUSED_TOKEN_146]user\n"
    post_prompt: " Answer this question with A, B, C, or D. Put your final answer in \\boxed{}.[UNUSED_TOKEN_145]\n[UNUSED_TOKEN_146]assistant\n"
metadata:
  - version: 0.0
