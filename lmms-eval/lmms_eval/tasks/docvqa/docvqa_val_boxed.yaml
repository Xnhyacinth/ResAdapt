task: "docvqa_val_boxed"
include: _default_template_docvqa_yaml
test_split: validation
metric_list:
  - metric: anls
    aggregation: mean
    higher_is_better: true
generation_kwargs:
  max_new_tokens: 8192
  temperature: 0
  do_sample: False
  until: []
filter_list:
  - name: "boxed-extract"
    filter:
      - function: !function utils_boxed.BoxedFilter
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase. Put your final answer in \\boxed{}."
  qwen_vl:
    pre_prompt: ""
    post_prompt: " Answer: Put your final answer in \\boxed{}."
