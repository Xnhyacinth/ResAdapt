dataset_path: echo840/OCRBench
dataset_kwargs:
  token: True
task: "ocrbench_boxed"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.ocrbench_doc_to_visual
doc_to_text: !function utils.ocrbench_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 8192
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
  until: []
process_results: !function utils_boxed.ocrbench_process_results
metric_list:
  - metric: ocrbench_accuracy
    aggregation: !function utils.ocrbench_aggregate_accuracy
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "Put your final answer in \\boxed{}."
  plm:
    pre_prompt: ""
    post_prompt: "\nProvide a short and direct response. Put your final answer in \\boxed{}."
metadata:
  - version: 0.0
